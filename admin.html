<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>AgriFarm - Administration</title>
    <style>
        :root {
            --fond: #444444;
            --carte: #23272a;
            --accent: #eb459e;
            --bleu: #00d4ff;
        }

        body {
            background-color: var(--fond);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 40px;
            text-align: center;
        }

        .admin-container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header-admin {
            background: var(--carte);
            padding: 20px;
            border-radius: 15px;
            border-left: 5px solid var(--accent);
            margin-bottom: 30px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .grid-tools {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .tool-card {
            background: var(--carte);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #3e4147;
            transition: 0.3s;
        }

        .tool-card:hover {
            transform: translateY(-5px);
            border-color: var(--bleu);
        }

        h3 { color: var(--bleu); margin-top: 0; }

        .btn-admin {
            display: inline-block;
            background: #3e4147;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            margin-top: 10px;
            transition: 0.3s;
            border: none;
            cursor: pointer;
        }

        .btn-admin:hover {
            background: var(--accent);
        }

        .status-dot {
            height: 10px;
            width: 10px;
            background-color: #43b581;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }

        .back-link {
            display: block;
            margin-top: 40px;
            color: #aaa;
            text-decoration: none;
        }

        .back-link:hover { color: white; }
    </style>
</head>
<body>

    <div class="admin-container">
        <div class="header-admin">
            <h1 style="margin:0;">Panneau d'Administration 👑</h1>
            <p style="color: #b9bbbe;">Bienvenue, Fondateur. Gérez les serveurs et les mods d'AgriFarm.</p>
        </div>

        <div class="grid-tools">
            <div class="tool-card">
                <h3>🖥️ Serveurs</h3>
                <p><span class="status-dot"></span> FS22 : En ligne</p>
                <p><span class="status-dot" style="background: #f04747;"></span> FS25 : Maintenance</p>
                <button class="btn-admin">Redémarrer</button>
            </div>

            <div class="tool-card">
                <h3>📦 Mods</h3>
                <p>62 mods actifs</p>
                <p>3 en attente de validation</p>
                <button class="btn-admin">Ajouter un Mod</button>
            </div>

            <div class="tool-card">
                <h3>👥 Communauté</h3>
                <p>Dernière plainte : Aucune</p>
                <button class="btn-admin">Logs Discord</button>
            </div>
        </div>

        <a href="index.html" class="back-link">← Retour au site public</a>
    </div>

</body>
</html>
