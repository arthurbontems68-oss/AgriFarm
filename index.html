<!DOCTYPE html>
<html>
<head>
    <style>
        .discord-status {
            background-color: #333;
            color: white;
            padding: 15px;
            border-radius: 15px;
            display: inline-flex;
            align-items: center;
            font-family: sans-serif;
            border: 1px solid #444;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .dot {
            height: 12px;
            width: 12px;
            background-color: #23a55a; /* Vert Discord */
            border-radius: 50%;
            display: inline-block;
            margin-right: 10px;
        }

        #online-count {
            font-weight: bold;
            margin-left: 5px;
        }
    </style>
</head>
<body>

    <div class="discord-status">
        <span class="dot"></span>
        Discord : <span id="online-count">Chargement...</span> &nbsp;membres en ligne
    </div>

    <script>
        // REMPLACE "TON_ID_SERVEUR" par l'ID que tu as copié dans Discord
        const SERVER_ID = "1439219537164894211"; 

        async function getDiscordOnline() {
            try {
                const response = await fetch(`https://discord.com/api/guilds/${SERVER_ID}/widget.json`);
                const data = await response.json();
                
                // On affiche le nombre d'utilisateurs en ligne (presence_count)
                document.getElementById('online-count').innerText = data.presence_count;
            } catch (error) {
                document.getElementById('online-count').innerText = "?";
                console.error("Erreur Discord:", error);
            }
        }

        // Appeler la fonction au chargement
        getDiscordOnline();
        // Optionnel : Rafraîchir toutes les 60 secondes
        setInterval(getDiscordOnline, 60000);
    </script>

</body>
</html>
