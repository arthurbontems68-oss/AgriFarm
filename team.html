<style>
    .discord-card-custom {
        background-color: #23272a;
        border-radius: 12px;
        padding: 20px;
        width: 300px;
        border: 1px solid #333;
        box-shadow: 0 4px 15px rgba(0,0,0,0.4);
    }
    .profile-header { display: flex; align-items: center; gap: 15px; margin-bottom: 12px; }
    .avatar-container { position: relative; width: 60px; height: 60px; }
    .avatar-container img { width: 100%; height: 100%; border-radius: 50%; background-color: #333; }
    .avatar-container div { position: absolute; bottom: 2px; right: 2px; width: 14px; height: 14px; border-radius: 50%; border: 3px solid #23272a; }
    .badge-fonda { color: white; font-size: 10px; padding: 2px 8px; border-radius: 4px; text-transform: uppercase; font-weight: bold; display: inline-block; margin-top: 4px; background-color: #5865F2; }
    .activity-style { font-size: 12px; color: #b9bbbe; font-style: italic; }
    .description-text { font-size: 13px; color: #dcddde; border-top: 1px solid #3e4147; padding-top: 10px; margin-top: 10px; line-height: 1.4; }
    .online { background-color: #43b581; }
    .idle { background-color: #faa61a; }
    .dnd { background-color: #f04747; }
    .offline { background-color: #747f8d; }
</style>

<script>
    (function() {
        const users = [
            { id: "1136704051971624992", suffix: "1" },
            { id: "1464583530066481207", suffix: "2" } // <--- METS L'ID DU DEUXIÈME ICI
        ];

        async function refreshAll() {
            for (let user of users) {
                try {
                    const response = await fetch(`https://api.lanyard.rest/v1/users/${user.id}`);
                    const { data } = await response.json();
                    
                    if(data.discord_user.avatar) {
                        document.getElementById(`ds-avatar-${user.suffix}`).src = `https://cdn.discordapp.com/avatars/${user.id}/${data.discord_user.avatar}.png?size=128`;
                    }
                    document.getElementById(`ds-dot-${user.suffix}`).className = data.discord_status;
                    
                    let statusText = data.discord_status === 'offline' ? 'Hors ligne' : 'En ligne';
                    if (data.activities.length > 0) {
                        statusText = data.activities[0].state || data.activities[0].name;
                    }
                    document.getElementById(`ds-activity-${user.suffix}`).innerText = statusText;
                } catch (err) { console.log("Erreur Lanyard"); }
            }
        }
        refreshAll(); setInterval(refreshAll, 20000);
    })();
</script>
