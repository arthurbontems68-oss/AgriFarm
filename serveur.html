<script>
    (function() {
        const myId = "1136704051971624992";
        async function updateSrv() {
            try {
                const r = await fetch(`https://api.lanyard.rest/v1/users/${myId}`);
                const { data } = await r.json();
                const fs = data.activities.find(a => a.name.includes("Farming Simulator 22"));
                if (fs && fs.party && fs.party.size) {
                    document.getElementById('player-count').innerText = `${fs.party.size[0]} / ${fs.party.size[1]}`;
                }
            } catch (e) {}
        }
        updateSrv(); setInterval(updateSrv, 20000);
    })();
</script>
