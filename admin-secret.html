<script>
    // Si la clé 'estAdmin' n'est pas égale à 'true', on dégage l'utilisateur
    if (localStorage.getItem('estAdmin') !== 'true') {
        alert("Accès non autorisé !");
        window.location.href = "index.html"; 
    }
</script>

<h1>Bienvenue dans le panneau Admin 🚀</h1>
<button onclick="deconnexion()">Se déconnecter</button>

<script>
    function deconnexion() {
        localStorage.removeItem('estAdmin'); // On efface la clé
        window.location.href = "index.html"; // On retourne à l'accueil
    }
</script>
