<script src="anti-devtools.js"></script>
{
  "cleanUrls": true
}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Tracteur Égaré | Agrifarm</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #0d1117; /* Ton fond sombre habituel */
            font-family: 'Segoe UI', sans-serif;
            color: white;
            text-align: center;
            overflow: hidden;
        }

        .container {
            max-width: 600px;
            padding: 20px;
        }

        .error-code {
            font-size: 8rem;
            font-weight: 900;
            margin: 0;
            color: #0084ff;
            line-height: 1;
            text-shadow: 0 0 20px rgba(0, 132, 255, 0.5);
        }

        .error-icon {
            font-size: 5rem;
            margin: 20px 0;
        }

        h1 {
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        p {
            color: #9da5af;
            margin-bottom: 30px;
        }

        .btn-home {
            display: inline-block;
            background: #0084ff;
            color: white;
            text-decoration: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
            border: 1px solid #0084ff;
        }

        .btn-home:hover {
            background: transparent;
            color: #0084ff;
            box-shadow: 0 0 15px rgba(0, 132, 255, 0.4);
        }

        /* Animation de brouillard pour l'ambiance */
        .fog {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, transparent 0%, #0d1117 70%);
            z-index: -1;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="fog"></div>

    <div class="container">
        <div class="error-icon">🚜💨</div>
        <div class="error-code">404</div>
        <h1>Oups ! Ce champ est en jachère.</h1>
        <p>Le tracteur a dû prendre un mauvais virage. La page que vous cherchez n'existe pas ou a été déplacée.</p>
        
        <a href="mods.html" class="btn-home">Retour à la ferme</a>
    </div>

</body>
</html>
